<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Accent line -->
  <rect x="80" y="180" width="120" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Name -->
  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#f0f6fc">Arun Kumar</text>
  
  <!-- Title -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#8b949e">Full-Stack Mobile Engineer &amp; Product Builder</text>
  
  <!-- Stats -->
  <text x="80" y="350" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#58a6ff">25+ apps live</text>
  <text x="280" y="350" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#8b949e">•</text>
  <text x="310" y="350" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#3fb950">45K+ users</text>
  <text x="480" y="350" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#8b949e">•</text>
  <text x="510" y="350" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#d2a8ff">5+ years</text>
  
  <!-- Tech stack -->
  <text x="80" y="400" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#8b949e">Flutter • React Native • Android • iOS • Django • Next.js • AI-Dev</text>
  
  <!-- Tags -->
  <rect x="80" y="440" width="90" height="30" rx="15" fill="#1f6feb22" stroke="#1f6feb" stroke-width="1"/>
  <text x="125" y="460" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle">Flutter</text>
  
  <rect x="185" y="440" width="120" height="30" rx="15" fill="#23863622" stroke="#238636" stroke-width="1"/>
  <text x="245" y="460" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#3fb950" text-anchor="middle">React Native</text>
  
  <rect x="320" y="440" width="90" height="30" rx="15" fill="#a371f722" stroke="#a371f7" stroke-width="1"/>
  <text x="365" y="460" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#d2a8ff" text-anchor="middle">Django</text>
  
  <rect x="425" y="440" width="90" height="30" rx="15" fill="#f0883e22" stroke="#f0883e" stroke-width="1"/>
  <text x="470" y="460" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#f0883e" text-anchor="middle">Next.js</text>
  
  <rect x="530" y="440" width="70" height="30" rx="15" fill="#58a6ff22" stroke="#58a6ff" stroke-width="1"/>
  <text x="565" y="460" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle">AI-Dev</text>
  
  <!-- GitHub handle -->
  <text x="80" y="560" font-family="monospace" font-size="18" fill="#8b949e">@arundidauli</text>
  
  <!-- Decorative dots -->
  <circle cx="1050" cy="150" r="80" fill="#58a6ff" opacity="0.08"/>
  <circle cx="1100" cy="200" r="120" fill="#3fb950" opacity="0.06"/>
  <circle cx="1000" cy="400" r="60" fill="#d2a8ff" opacity="0.08"/>
</svg>
